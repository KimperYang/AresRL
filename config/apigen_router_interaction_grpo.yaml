interaction:
  - name: apigen_router
    class_name: router_interaction.APIGenRouterInteraction
    config:
      tau_bench_root: /home/azureuser/cloudfiles/code/Users/jingbo.yang/tau-bench
      tool_domain: auto
      oss_model: openai/gpt-oss-20b
      oss_provider: oss
      oss_temperature: 1.0
      oss_max_tokens: 4096
      oss_timeout: null
      user_model: openai/gpt-oss-20b
      user_provider: oss
      user_temperature: 1.0
      user_max_tokens: 2048
      judge_model: openai/gpt-oss-20b
      judge_provider: oss
      judge_temperature: 0.6
      judge_max_tokens: 2048
      azure_retry_max_attempts: 3
      azure_retry_base_delay: 5.0
      azure_retry_max_delay: 60.0
      request_timeout: 60
      max_total_steps: 30
      max_history_chars: 8000
      max_judge_chars: 30000
      log_dir: outputs/router_rollouts
      log_every_n: 1
      print_rollout_summary: True
      print_rollouts: False
      print_max_chars: 4000
      verify_method: tau_bench
      success_reward: 5.0
      failure_reward: 0.0
      penalties:
        low: -0.2
        medium: -0.5
        high: -1.0
      step_penalty_on_success_only: true
      step_penalty_aggregation: mean
      thinking_model: True
      format_penalty: -1.0
      terminate_tools:
        - transfer_to_human_agents
