hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

trainer:
  project_name: agentic_rl
  experiment_name: router_ppo_thinking_v4
  logger: ["console", "wandb"]
  total_epochs: 3
  balance_batch: False
  val_before_train: True
  critic_warmup: 50
  test_freq: 10
  save_freq: 5
  max_actor_ckpt_to_keep: 1
  max_critic_ckpt_to_keep: 1
  default_local_dir: /mnt/tmp/training_res/rl_sft_thinking_v4
  nnodes: 1
  n_gpus_per_node: 4

data:
  train_files: /mnt/batch/tasks/shared/LS_root/mounts/clusters/jingbo-h100/code/Users/jingbo.yang/TBAMA/rl/data/apigen_router_gt50/train.parquet
  val_files: /mnt/batch/tasks/shared/LS_root/mounts/clusters/jingbo-h100/code/Users/jingbo.yang/TBAMA/rl/data/apigen_router_gt50/val.parquet
  train_batch_size: 64
  val_batch_size: 4
  cache_dir: /mnt/batch/tasks/shared/LS_root/mounts/clusters/jingbo-h100/code/Users/jingbo.yang/TBAMA/rl/outputs/verl_cache/rlhf
  max_prompt_length: 4096
  max_response_length: 512
  dataloader_num_workers: 0
  return_raw_chat: True
  filter_overlong_prompts: False
  shuffle: True

actor_rollout_ref:
  model:
    path: /mnt/tmp/training_res/router_thinking_sft_qwen3_1p7b_3epoch/checkpoint-2034
    trust_remote_code: False
  rollout:
    name: vllm
    load_format: auto
    tensor_model_parallel_size: 1
    data_parallel_size: 1
    pipeline_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    max_num_batched_tokens: 4096
    max_num_seqs: 64
    enforce_eager: True
    enable_prefix_caching: False
    log_prob_micro_batch_size_per_gpu: 1
    prompt_length: 4096
    response_length: 512
    max_model_len: 4104
    temperature: 1.0
    top_k: -1
    top_p: 1.0
    do_sample: True
    val_kwargs:
      do_sample: False
      temperature: 1.0
    multi_turn:
      enable: True
      max_assistant_turns: 24
      max_user_turns: 24
      interaction_config_path: config/apigen_router_interaction.yaml
      drop_failed_samples: True
    custom:
      progress_bar: True
      progress_desc: router_rollouts
      generate_timeout_s: null
      remote_chunk_size: 32
    agent:
      num_workers: 4
      default_agent_loop: apigen_router_agent
      agent_loop_config_path: config/apigen_router_agent_loop.yaml
      agent_loop_manager_class: router_step_agent_loop.RouterStepAgentLoopManager
  actor:
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 4
    ppo_max_token_len_per_gpu: 16384
    ppo_epochs: 2
    optim:
      lr: 5.0e-07

critic:
  model:
    path: /mnt/tmp/training_res/router_thinking_sft_qwen3_1p7b_3epoch/checkpoint-2034
  ppo_mini_batch_size: 64
  ppo_micro_batch_size_per_gpu: 4
  ppo_max_token_len_per_gpu: 16384
  ppo_epochs: 2
  optim:
    lr: 1.0e-06

algorithm:
  broadcast_critic_values: True
  kl_ctrl:
    kl_coef: 0.05

reward_model:
  enable: False

ray_kwargs:
  ray_init:
    include_dashboard: False
    runtime_env:
      excludes:
        - outputs/**
        - data/apigen_with_instruction_full.json
        - data/apigen_router_gt50/train.parquet
        - data/apigen_router_gt50/val.parquet
